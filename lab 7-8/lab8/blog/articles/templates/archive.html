<!DOCTYPE html>
<html>
<head>
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{{ STATIC_URL }}css/article.css">
</head>
<body class="archive">
    <div class="header">
        <img src="{{ STATIC_URL }}img/dpb-logo.png" alt="Логотип" />
        <div class="header-links">
            <a href="/register/">Регистрация</a>
            <a href="/login/">Войти</a>
        </div>
    </div>
    <div class="archive">
        {% if request.user.is_authenticated %}
        <p><a href="/article/new/">+ Написать статью</a></p>
        {% endif %}
        {% for post in posts %}
        <div class="one-post">
            <div class="post-managment">
                <h2 class="post-title">
                    <a href="/article/{{ post.id }}/">{{ post.title }}</a>
                </h2>
                <p class="fold-button">Свернуть</p>
            </div>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.get_excerpt }}</p>
            <!-- Блок тени для эффекта подсветки (лаб 8) -->
            <div class="one-post-shadow"></div>
        </div>
        {% endfor %}
    </div>

    <!-- Вариант 2: CDN (раскомментировать если нет локального файла) -->
    <script src="https://code.jquery.com/jquery-1.12.4.min.js"></script>

    <script src="{{ STATIC_URL }}js/helloworld.js"></script>
    <script src="{{ STATIC_URL }}js/fold-post.js"></script>
    <script src="{{ STATIC_URL }}js/highlight-post.js"></script>
</body>
</html>
