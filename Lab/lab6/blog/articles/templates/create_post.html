<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Django Public Blog - создать статью</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="content">
        <h1>Написать статью</h1>

        <form method="POST">
            {% csrf_token %}

            <input type="text"
                   name="title"
                   placeholder="Название статьи"
                   value="{{ form.title }}">

            <textarea name="text"
                      placeholder="Текст статьи">{{ form.text }}</textarea>

            <input type="submit" value="Сохранить">

            {% if form.errors %}
                <div class="error">{{ form.errors }}</div>
            {% endif %}
        </form>
    </div>
</body>
</html>
