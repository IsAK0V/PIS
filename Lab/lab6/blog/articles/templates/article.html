<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="/static/css/article.css">
</head>
<body class="article">
    <div class="header">
        <h1>Django public blog</h1>

        <div class="top-links">
            <a href="/archive/">Все статьи</a>

            {% if user.is_authenticated %}
                <a href="/article/new/">Написать статью</a>
                <span class="username">{{ user.username }}</span>
                <a href="/logout/">Выход</a>
            {% else %}
                <a href="/register/">Регистрация</a>
                <a href="/login/">Вход</a>
            {% endif %}
        </div>
    </div>

    <div class="article-content">
        <h1 class="post-title">{{ post.title }}</h1>
        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>
        <p class="article-text">{{ post.text }}</p>
    </div>
</body>
</html>
