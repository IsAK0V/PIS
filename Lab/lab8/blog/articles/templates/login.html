<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Авторизация</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="content">
        <h1>Авторизация</h1>

        <form method="POST">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Логин" value="{{ form.username }}">
            <input type="password" name="password" placeholder="Пароль">

            <input type="submit" value="Войти">
        </form>

        {% if form.errors %}
            <div class="error">{{ form.errors }}</div>
        {% endif %}
    </div>
</body>
</html>
