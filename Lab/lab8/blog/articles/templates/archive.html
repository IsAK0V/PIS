<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="/static/css/article.css">
</head>
<body>
    <div class="header">
    <a href="/archive/" class="logo-link">
        <img src="/static/img/logo.png" class="logo-image" alt="Django public blog">
    </a>

    <div class="top-links">
        {% if user.is_authenticated %}
            <a href="/article/new/">Написать статью</a>
            <span class="username">{{ user.username }}</span>
            <a href="/logout/">Выход</a>
        {% else %}
            <a href="/register/">Регистрация</a>
            <a href="/login/">Вход</a>
        {% endif %}
    </div>
</div>

    <div class="archive">
        {% for post in posts %}
        <div class="one-post">

            <div class="one-post-shadow"></div>

            <h2 class="post-title">
                <a href="/article/{{ post.id }}/">{{ post.title }}</a>
            </h2>

            <a href="#" class="fold-button">свернуть</a>

            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>

            <p class="article-text">{{ post.get_excerpt }}</p>
        </div>
        {% empty %}
            <p>Пока нет ни одной статьи.</p>
        {% endfor %}
    </div>

    <script src="/static/js/jquery.js"></script>
    <script src="/static/js/helloworld.js"></script>
    <script src="/static/js/fold-post.js"></script>
    <script src="/static/js/highlight-post.js"></script>
	<script src="/static/js/logo-animation.js"></script>
</body>
</html>
